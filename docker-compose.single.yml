# Single container only (MongoDB external / Atlas)
# Use when you already have MongoDB URI

services:
  niche-daily:
    build:
      context: .
      dockerfile: Dockerfile
    image: niche-daily:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      WEB_PORT: 3001
      API_PORT: 3000
      WHATSAPP_AUTH_DIR: /app/whatsapp_auth
    volumes:
      - niche_wa_auth:/app/whatsapp_auth

volumes:
  niche_wa_auth:
