# Single app container + external Mongo (Atlas / shared VPS Mongo)
# Use this when MONGODB_URI points outside compose network.
#
# Required env (Dokploy env UI or .env):
#   MONGODB_URI=.../niche-daily...
#   AUTHORIZED_PHONE=628...
#   API_KEY=...

services:
  niche-daily:
    build:
      context: .
      dockerfile: Dockerfile
    image: niche-daily:latest
    restart: unless-stopped
    ports:
      - "${HOST_WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Force docker port layout; keep external MONGODB_URI from env_file / Dokploy
      API_PORT: 4000
      PORT: 4000
      WEB_PORT: 3000
      WHATSAPP_AUTH_DIR: /app/whatsapp_auth
    volumes:
      - niche_wa_auth:/app/whatsapp_auth

volumes:
  niche_wa_auth:
