# Single container only (MongoDB external / Atlas)
# Publishes only web dashboard port to host.

services:
  niche-daily:
    build:
      context: .
      dockerfile: Dockerfile
    image: niche-daily:latest
    restart: unless-stopped
    ports:
      - "${HOST_WEB_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      PORT: 3000
      WEB_PORT: 3001
      API_PORT: 3000
      WHATSAPP_AUTH_DIR: /app/whatsapp_auth
    volumes:
      - niche_wa_auth:/app/whatsapp_auth

volumes:
  niche_wa_auth:
