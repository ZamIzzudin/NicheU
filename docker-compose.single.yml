# Single container + external Mongo
# Public port: 3000 only

services:
  niche-daily:
    build:
      context: .
      dockerfile: Dockerfile
    image: niche-daily:latest
    restart: unless-stopped
    ports:
      - "${HOST_WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      API_PORT: 4000
      PORT: 4000
      WEB_PORT: 3000
      WHATSAPP_AUTH_DIR: /app/whatsapp_auth
    volumes:
      - niche_wa_auth:/app/whatsapp_auth

volumes:
  niche_wa_auth:
