# Niche Daily — Dokploy + Cloudflare friendly
#
# Public app port INSIDE container: 3000 (Next.js UI)
# Internal API: 4000 (not published; Next rewrites /api/*)
#
# MONGODB_URI:
#   - default (internal): mongodb://mongo:27017/niche-daily
#   - shared/Atlas: set MONGODB_URI in Dokploy env (same as local) — this OVERRIDES default
#   - if using external Mongo, you can disable the `mongo` service via COMPOSE profile

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    profiles: ["internal-mongo"]
    volumes:
      - niche_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  niche-daily:
    build:
      context: .
      dockerfile: Dockerfile
    image: niche-daily:latest
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "${HOST_WEB_PORT:-3000}:3000"
    environment:
      # IMPORTANT: do not hardcode — must respect Dokploy/local env (shared Atlas/local Mongo)
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/niche-daily}
      API_BASE_URL: ${API_BASE_URL:-https://api.openai.com/v1}
      API_KEY: ${API_KEY}
      API_MODEL: ${API_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      AUTHORIZED_PHONE: ${AUTHORIZED_PHONE}
      API_TOKEN: ${API_TOKEN:-change-me}
      API_PORT: 4000
      PORT: 4000
      WEB_PORT: 3000
      TIMEZONE: ${TIMEZONE:-Asia/Jakarta}
      ENABLE_QUIET_HOURS: ${ENABLE_QUIET_HOURS:-true}
      QUIET_HOURS_START: ${QUIET_HOURS_START:-23:30}
      QUIET_HOURS_END: ${QUIET_HOURS_END:-06:30}
      PROACTIVE_MIN_INTERVAL_SEC: ${PROACTIVE_MIN_INTERVAL_SEC:-300}
      PROACTIVE_MAX_PER_DAY: ${PROACTIVE_MAX_PER_DAY:-12}
      PROACTIVE_MAX_OVERDUE_MIN: ${PROACTIVE_MAX_OVERDUE_MIN:-8}
      USER_BUBBLE_DEBOUNCE_SEC: ${USER_BUBBLE_DEBOUNCE_SEC:-120}
      SCHEDULE_TICK_MS: ${SCHEDULE_TICK_MS:-30000}
      MEMORY_IMPORTANCE_THRESHOLD: ${MEMORY_IMPORTANCE_THRESHOLD:-0.7}
      MEMORY_RETRIEVAL_LIMIT: ${MEMORY_RETRIEVAL_LIMIT:-5}
      HISTORY_MAX_MESSAGES: ${HISTORY_MAX_MESSAGES:-24}
      WHATSAPP_AUTH_DIR: /app/whatsapp_auth
      ALLOW_LID_OWNER_FALLBACK: ${ALLOW_LID_OWNER_FALLBACK:-true}
    volumes:
      - niche_wa_auth:/app/whatsapp_auth
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "Promise.all([fetch('http://127.0.0.1:3000/'),fetch('http://127.0.0.1:4000/api/health')]).then(async ([w,a])=>{if(w.status>=500||!a.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  niche_mongo_data:
  niche_wa_auth:
