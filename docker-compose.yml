# Niche Daily — Dokploy friendly
# ONE public port: 3000 (Web UI + /api proxy)
# API listens internally on 4000 only.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - niche_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  niche-daily:
    build:
      context: .
      dockerfile: Dockerfile
    image: niche-daily:latest
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      # Dokploy domain must target this container port
      - "${HOST_WEB_PORT:-3000}:3000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/niche-daily
      API_BASE_URL: ${API_BASE_URL:-https://api.openai.com/v1}
      API_KEY: ${API_KEY}
      API_MODEL: ${API_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      AUTHORIZED_PHONE: ${AUTHORIZED_PHONE}
      API_TOKEN: ${API_TOKEN:-change-me}
      # Internal API port (not published)
      API_PORT: 4000
      PORT: 4000
      # Public web port (Dokploy domain)
      WEB_PORT: 3000
      TIMEZONE: ${TIMEZONE:-Asia/Jakarta}
      ENABLE_QUIET_HOURS: ${ENABLE_QUIET_HOURS:-true}
      QUIET_HOURS_START: ${QUIET_HOURS_START:-23:30}
      QUIET_HOURS_END: ${QUIET_HOURS_END:-06:30}
      PROACTIVE_MIN_INTERVAL_SEC: ${PROACTIVE_MIN_INTERVAL_SEC:-300}
      PROACTIVE_MAX_PER_DAY: ${PROACTIVE_MAX_PER_DAY:-12}
      PROACTIVE_MAX_OVERDUE_MIN: ${PROACTIVE_MAX_OVERDUE_MIN:-8}
      USER_BUBBLE_DEBOUNCE_SEC: ${USER_BUBBLE_DEBOUNCE_SEC:-120}
      SCHEDULE_TICK_MS: ${SCHEDULE_TICK_MS:-30000}
      MEMORY_IMPORTANCE_THRESHOLD: ${MEMORY_IMPORTANCE_THRESHOLD:-0.7}
      MEMORY_RETRIEVAL_LIMIT: ${MEMORY_RETRIEVAL_LIMIT:-5}
      HISTORY_MAX_MESSAGES: ${HISTORY_MAX_MESSAGES:-24}
      WHATSAPP_AUTH_DIR: /app/whatsapp_auth
      ALLOW_LID_OWNER_FALLBACK: ${ALLOW_LID_OWNER_FALLBACK:-true}
    volumes:
      - niche_wa_auth:/app/whatsapp_auth
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      # Helpful for Traefik-based platforms (Dokploy may also set its own labels)
      - traefik.enable=true

volumes:
  niche_mongo_data:
  niche_wa_auth:
